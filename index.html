<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bandri!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body { height:100%; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, #1a0030 0%, #0d001a 60%, #000 100%);
    font-family: 'Poppins', sans-serif;
    position: relative;
    padding: 40px 20px;
  }

  /* ── STARS ── */
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star {
    position:absolute; background:#fff; border-radius:50%;
    animation: twinkle var(--d,3s) ease-in-out infinite alternate;
    opacity: var(--o,.5);
  }
  @keyframes twinkle {
    from { opacity:var(--o,.2); }
    to   { opacity:1; transform:scale(1.4); }
  }

  /* ── FLOATERS ── */
  .floaters { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .floater {
    position:absolute; bottom:-60px; font-size:clamp(16px,3vw,24px);
    animation: rise var(--dur,10s) linear infinite;
    animation-delay: var(--del,0s);
    opacity:0;
  }
  @keyframes rise {
    0%   { transform:translateY(0) rotate(0deg); opacity:0; }
    10%  { opacity:.7; }
    90%  { opacity:.5; }
    100% { transform:translateY(-110vh) rotate(360deg); opacity:0; }
  }

  /* ── SCENE ── */
  .scene {
    width: min(440px, calc(100vw - 40px));
    cursor: pointer;
    position: relative;
    z-index: 1;
    perspective: 1200px;
    /* extra top margin so the monkey circle doesn't clip */
    margin-top: 60px;
  }

  .card-3d {
    width: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.1s cubic-bezier(.5,.1,.3,1.2);
    border-radius: 28px;
  }
  .card-3d.flipped { transform: rotateY(180deg); }

  .face {
    border-radius: 28px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* ════ FRONT ════ */
  .front {
    position: relative;
    overflow: hidden;
    background: linear-gradient(145deg, #1e0040, #3a006f, #1e0040);
    border: 2px solid rgba(200,100,255,0.4);
    box-shadow: 0 0 50px rgba(160,50,255,0.55), inset 0 0 70px rgba(100,0,180,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 3.5vw, 24px);
    padding: clamp(52px, 10vw, 72px) clamp(24px, 6vw, 44px);
  }

  .front-glow {
    position:absolute; inset:0;
    background: radial-gradient(circle at 50% 50%, rgba(200,100,255,0.15) 0%, transparent 70%);
    animation: pulseGlow 2.5s ease-in-out infinite;
  }
  @keyframes pulseGlow { 0%,100%{opacity:.5} 50%{opacity:1} }

  .gift-icon {
    font-size: clamp(64px, 16vw, 92px);
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,180,50,0.85));
    position: relative; z-index:1; line-height:1;
  }
  @keyframes bounce {
    0%,100% { transform:translateY(0) scale(1); }
    50%      { transform:translateY(-10px) scale(1.08); }
  }

  .front-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2em, 7vw, 2.6em);
    color: #f0c0ff;
    text-shadow: 0 0 22px rgba(220,100,255,0.85);
    position: relative; z-index:1;
    text-align: center;
    line-height: 1.25;
  }
  .front-sub {
    font-size: clamp(.85em, 2.8vw, 1em);
    color: rgba(220,180,255,0.75);
    font-weight: 300; letter-spacing:2px; text-transform:uppercase;
    position: relative; z-index:1; text-align:center;
    animation: flick 1.8s ease-in-out infinite alternate;
  }
  @keyframes flick { from{opacity:.45} to{opacity:1} }

  .tap-hint {
    font-size: clamp(.72em, 2.2vw, .85em);
    color: rgba(200,150,255,0.55); letter-spacing:1px;
    position: relative; z-index:1;
    animation: flick 1.4s ease-in-out infinite alternate;
    margin-top: 2px;
  }

  .cspark {
    position:absolute;
    font-size: clamp(16px, 4vw, 22px);
    animation: spinSpark 4s linear infinite;
  }
  @keyframes spinSpark {
    0%   { transform:rotate(0) scale(1);      opacity:.8; }
    50%  { transform:rotate(180deg) scale(1.3); opacity:1; }
    100% { transform:rotate(360deg) scale(1);   opacity:.8; }
  }
  .cspark:nth-child(1){top:14px;left:14px}
  .cspark:nth-child(2){top:14px;right:14px;animation-delay:-1s}
  .cspark:nth-child(3){bottom:14px;left:14px;animation-delay:-2s}
  .cspark:nth-child(4){bottom:14px;right:14px;animation-delay:-3s}

  /* ════ BACK ════ */
  .back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    overflow: visible;           /* let monkey circle pop above the card */
    background: linear-gradient(160deg, #fff8f0 0%, #fff0fa 50%, #f5e8ff 100%);
    border: 2px solid rgba(255,150,200,0.5);
    box-shadow: 0 0 60px rgba(255,100,180,0.45);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;   /* push content toward bottom, top space = monkey */
    padding-top: clamp(80px, 20vw, 100px);
    padding-bottom: clamp(32px, 7vw, 48px);
    padding-left: clamp(20px, 5vw, 36px);
    padding-right: clamp(20px, 5vw, 36px);
    gap: clamp(12px, 3vw, 18px);
  }

  /* Monkey circle — centred at top edge of card */
  .monkey-wrap {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(-50%);
    width:  clamp(110px, 30vw, 140px);
    height: clamp(110px, 30vw, 140px);
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #FF69B4;
    box-shadow: 0 6px 32px rgba(255,80,150,0.5);
    animation: popIn .65s cubic-bezier(.34,1.56,.64,1) both;
    animation-delay: .55s;
    z-index: 10;
    flex-shrink: 0;
  }
  @keyframes popIn {
    from { transform:translateX(-50%) translateY(-50%) scale(0) rotate(-20deg); opacity:0; }
    to   { transform:translateX(-50%) translateY(-50%) scale(1) rotate(0deg);   opacity:1; }
  }
  .monkey-emoji {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size: clamp(48px, 13vw, 66px);
    background: linear-gradient(135deg, #ffe0b2, #ffcc80);
  }

  .back-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.9em, 7vw, 2.5em);
    color: #c2185b;
    text-align: center;
    line-height: 1.2;
    animation: slideUp .5s ease both;
    animation-delay: .7s;
    flex-shrink: 0;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .back-prayer {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(.88em, 2.8vw, 1.05em);
    color: #6a1b4d;
    text-align: center;
    line-height: 1.85;
    padding: 0 4px;
    animation: slideUp .5s ease both;
    animation-delay: .88s;
    opacity: 0;
    animation-fill-mode: forwards;
    flex-shrink: 0;
  }

  /* ── confetti ── */
  .conf {
    position:fixed; pointer-events:none; z-index:999; border-radius:2px;
    animation: confDrop var(--cd,2s) ease-in forwards;
    animation-delay: var(--cdelay,0s);
  }
  @keyframes confDrop {
    0%   { transform:translate(0,0) rotate(0deg); opacity:1; }
    100% { transform:translate(var(--cx,0px),var(--cy,80px)) rotate(var(--cr,360deg)); opacity:0; }
  }
</style>
</head>
<body>

<div class="stars"    id="stars"></div>
<div class="floaters" id="floaters"></div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card-3d" id="card3d">

    <!-- FRONT -->
    <div class="face front">
      <div class="front-glow"></div>
      <span class="cspark">✨</span>
      <span class="cspark">🌟</span>
      <span class="cspark">✨</span>
      <span class="cspark">💫</span>
      <div class="gift-icon">🎁</div>
      <div class="front-title">You've got<br>a surprise!</div>
      <div class="front-sub">Something special awaits</div>
      <div class="tap-hint">tap to reveal →</div>
    </div>

    <!-- BACK -->
    <div class="face back" id="backFace">
      <div class="monkey-wrap">
        <div class="monkey-emoji">🐒</div>
      </div>
      <div class="back-name">Happy Birthday,<br>Bandri! 🎂</div>
      <div class="back-prayer">
        May this day overflow with laughter,<br>
        warmth, and everything you love.<br>
        May every wish your heart holds<br>
        quietly find its way to you —<br>
        and may you be blessed with<br>
        many, many more joyful days. 🌸
      </div>
    </div>

  </div>
</div>

<script>
/* ── STARS ── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 130; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText =
    `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;` +
    `--d:${2+Math.random()*4}s;--o:${0.2+Math.random()*0.6};animation-delay:${Math.random()*5}s`;
  starsEl.appendChild(s);
}

/* ── FLOATERS ── */
const floatEl = document.getElementById('floaters');
['🎉','🎈','💜','✨','🎊','💖','🌸','🎂','⭐','💫'].forEach((sym) => {
  for (let j = 0; j < 2; j++) {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = sym;
    f.style.cssText = `left:${Math.random()*100}%;--dur:${8+Math.random()*10}s;--del:${Math.random()*14}s`;
    floatEl.appendChild(f);
  }
});

/* ── SYNC BACK HEIGHT ──
   The back face is position:absolute so we set its height to match
   the front, but only if the back content needs MORE space — in that
   case we also grow the front so both faces are the same size. */
function syncCardHeight() {
  const front  = document.querySelector('.front');
  const back   = document.getElementById('backFace');
  const card3d = document.getElementById('card3d');
  if (!front || !back) return;

  /* reset to auto so we can measure natural heights */
  front.style.minHeight = '';
  back.style.height = 'auto';
  back.style.position = 'relative';
  back.style.transform = 'none';
  back.style.visibility = 'hidden';

  const frontH = front.offsetHeight;
  const backH  = back.offsetHeight;
  const h      = Math.max(frontH, backH);

  /* restore back */
  back.style.position = '';
  back.style.transform = '';
  back.style.visibility = '';
  back.style.height = h + 'px';

  /* if back was taller, grow front too */
  if (backH > frontH) front.style.minHeight = h + 'px';
}

syncCardHeight();
window.addEventListener('resize', syncCardHeight);

/* ── CONFETTI ── */
function burst() {
  const cols = ['#FF69B4','#FFD700','#C77DFF','#FF3366','#7ED6DF','#FFA500','#fff','#a5f3fc'];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'conf';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 100 + Math.random() * 300;
    const w = 6 + Math.random() * 9;
    el.style.cssText =
      `left:${cx}px;top:${cy}px;` +
      `background:${cols[~~(Math.random()*cols.length)]};` +
      `--cx:${Math.cos(angle)*dist}px;--cy:${Math.sin(angle)*dist}px;` +
      `--cr:${Math.random()*720-360}deg;` +
      `--cd:${1.2+Math.random()*1.4}s;` +
      `--cdelay:${Math.random()*0.4}s;` +
      `border-radius:${Math.random()>.5?'50%':'3px'};` +
      `width:${w}px;height:${w}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }
}

/* ── FLIP ── */
let flipped = false;
function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card3d').classList.add('flipped');
  document.getElementById('scene').style.cursor = 'default';
  setTimeout(burst, 560);
}
</script>
</body>
</html>
